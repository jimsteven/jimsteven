<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Jim Steven Espelico profile terminal card dark theme</title>
  <desc id="desc">Old-school terminal style profile card with a moving scan line, ASCII art portrait, and system information for Jim Steven Espelico.</desc>
  <defs>
    <linearGradient id="frame" x1="40" y1="40" x2="1160" y2="580" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A21CAF"/>
      <stop offset="0.5" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#14F1D9"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#0B1020"/>
      <stop offset="1" stop-color="#080C16"/>
    </linearGradient>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#263248" opacity="0.28"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: "SFMono-Regular", "Menlo", "Consolas", "Liberation Mono", monospace; }
      .small { font-size: 11px; letter-spacing: 0.20em; }
      .label { fill: #6EE7E0; font-weight: 700; }
      .value { fill: #E6EDF3; }
      .muted { fill: #8BA0BE; }
      .accent { fill: #F472B6; }
      .cyan { fill: #14F1D9; }
      .blue { fill: #7CB2FF; }
      .green { fill: #78F9A0; }
      .line { stroke: #8CF7ED; stroke-width: 2; opacity: 0.7; filter: url(#glow); }
    </style>
  </defs>

  <rect width="1200" height="620" rx="26" fill="#060A13"/>
  <rect x="14" y="14" width="1172" height="592" rx="22" fill="url(#bg)" stroke="url(#frame)" stroke-width="2.5"/>
  <rect x="14" y="14" width="1172" height="592" rx="22" fill="url(#scanlines)" opacity="0.65"/>

