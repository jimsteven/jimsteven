  <text x="20" y="130" class="mono" fill="#E6EDF3" font-size="12">Theme: terminal / CRT</text>
  <text x="20" y="154" class="mono" fill="#8BA0BE" font-size="10">Local fallback card to avoid broken remote images</text>
</svg>
